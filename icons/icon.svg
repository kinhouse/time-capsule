<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0b0b18"/>
  <!-- Stars -->
  <circle cx="14" cy="16" r="1.2" fill="#a78bfa" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.9" fill="#60a5fa" opacity="0.6"/>
  <circle cx="88" cy="32" r="1.3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="8"  cy="62" r="0.9" fill="#60a5fa" opacity="0.6"/>
  <circle cx="92" cy="68" r="1.2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="20" cy="85" r="0.8" fill="#60a5fa" opacity="0.5"/>
  <circle cx="60" cy="90" r="1"   fill="#a78bfa" opacity="0.4"/>
  <!-- Calendar body -->
  <rect x="16" y="28" width="68" height="54" rx="7" fill="#13132a" stroke="#7c6fff" stroke-width="2.5"/>
  <!-- Calendar header bar -->
  <rect x="16" y="28" width="68" height="20" rx="7" fill="#7c6fff"/>
  <rect x="16" y="41" width="68" height="7" fill="#7c6fff"/>
  <!-- Hook pegs -->
  <rect x="30" y="20" width="5" height="15" rx="2.5" fill="#e8e8f4"/>
  <rect x="65" y="20" width="5" height="15" rx="2.5" fill="#e8e8f4"/>
  <!-- Calendar grid cells -->
  <rect x="23" y="56" width="10" height="7" rx="2" fill="#7c6fff" opacity="0.5"/>
  <rect x="37" y="56" width="10" height="7" rx="2" fill="#a78bfa"/>
  <rect x="51" y="56" width="10" height="7" rx="2" fill="#7c6fff" opacity="0.4"/>
  <rect x="65" y="56" width="10" height="7" rx="2" fill="#7c6fff" opacity="0.3"/>
  <rect x="23" y="68" width="10" height="7" rx="2" fill="#7c6fff" opacity="0.3"/>
  <rect x="37" y="68" width="10" height="7" rx="2" fill="#7c6fff" opacity="0.3"/>
  <rect x="51" y="68" width="10" height="7" rx="2" fill="#7c6fff" opacity="0.5"/>
  <rect x="65" y="68" width="10" height="7" rx="2" fill="#7c6fff" opacity="0.3"/>
</svg>
